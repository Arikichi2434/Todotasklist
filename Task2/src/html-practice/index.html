<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Practice</title>
</head>
<body>
  <h1>フロントエンド学習メモ</h1>

  <p>HTMLは、画面に表示する部品と構造を作るための言語です。</p>

  <section>
    <h2>今日の学習テーマ</h2>
    <p>画面の中にある部品が、どのHTMLタグで作られているかを確認します。</p>
  </section>

  <section>
    <h2>メモを入力する</h2>
    <input type="text" placeholder="学んだことを書く">
    <button>追加する</button>
  </section>

  <section>
    <h2>確認するタグ</h2>
    <ul>
      <li>h1: ページの大きな見出し</li>
      <li>p: 文章</li>
      <li>input: 入力欄</li>
      <li>button: ボタン</li>
      <li>ulとli: リスト</li>
    </ul>
  </section>
</body>
</html>
